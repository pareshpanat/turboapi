name: Publish to PyPI

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: [ "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Lint
        run: ruff check .
      - name: Test
        run: python -m pytest -q

  build:
    runs-on: ubuntu-latest
    needs: test-and-lint
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build distribution
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine
          rm -rf dist build
          python -m build
      - name: Verify distribution filenames
        run: |
          ls -la dist
          python - <<'PY'
          import pathlib, sys
          files = [p.name for p in pathlib.Path("dist").glob("*") if p.is_file()]
          if not files:
              print("No distribution artifacts found in dist/")
              sys.exit(1)
          bad = [f for f in files if not f.startswith("py_turbo_api-")]
          if bad:
              print("Unexpected distribution artifact(s):", ", ".join(bad))
              sys.exit(1)
          print("Distribution artifacts verified:", ", ".join(files))
          PY
      - name: Check distribution metadata
        run: twine check dist/py_turbo_api-*
      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/py_turbo_api-*

  publish:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      id-token: write
      contents: read
    environment:
      name: pypi
    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist
      - name: Sanitize publish artifact set
        run: |
          find dist -type f ! -name 'py_turbo_api-*' -delete
          ls -la dist
      - uses: pypa/gh-action-pypi-publish@release/v1
