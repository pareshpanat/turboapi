changelog:
  exclude:
    labels:
      - ignore-for-release
  categories:
    - title: Breaking Changes
      labels:
        - breaking
    - title: Features
      labels:
        - feature
        - enhancement
    - title: Fixes
      labels:
        - bug
        - fix
    - title: Documentation
      labels:
        - docs
    - title: Maintenance
      labels:
        - chore
        - ci
change-template: "- $TITLE (#$NUMBER) @$AUTHOR"
template: |
  ## What's Changed

  $CHANGES

  ## Full Changelog
  https://github.com/pareshpanat/turboapi/compare/$PREVIOUS_TAG...$NEXT_TAG
